<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>TEMAZOS ROOMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div id="app">
    <header class="topbar">
      <div>
        <h1 class="logo">TEMAZOS</h1>
        <p class="logo-sub">rooms · neon music battle</p>
      </div>
      <div class="status-pills">
        <span class="pill" id="auth-pill">Conectando…</span>
        <span class="pill cyan" id="phase-pill">HOME</span>
      </div>
    </header>

    <main id="main-view"></main>
  </div>

  <template id="home-template">
    <div id="invite-banner" class="invite-banner" style="display:none">
      <div class="invite-banner-inner">
        <span class="eyebrow neon">te han invitado</span>
        <h2 id="invite-room-code">TEMA-XXXX</h2>
        <p>Escribe tu nombre y pulsa <strong>Unirse</strong> para entrar a la partida.</p>
      </div>
    </div>

    <section class="card hero-card">
      <div class="card-head">
        <span class="eyebrow">multiplayer realtime</span>
        <h2>Crea una sala o únete desde tu móvil</h2>
        <p>El moderador abre la canción. Todos responden el año desde su propio móvil.</p>
      </div>
      <div class="home-grid">
        <div class="field-block">
          <label>Tu nombre</label>
          <input id="home-name" type="text" maxlength="18" placeholder="Escribe tu nombre" autocomplete="off" autocorrect="off" autocapitalize="words" />
        </div>
        <div class="field-block">
          <label>Código de sala</label>
          <input id="home-room-code" type="text" maxlength="16" placeholder="TEMA-4821" autocapitalize="characters" autocomplete="off" />
        </div>
      </div>
      <div class="button-stack">
        <button class="btn primary" id="btn-create-room">Crear sala</button>
        <button class="btn secondary" id="btn-join-room">Unirse a sala</button>
      </div>
      <div id="quick-room-slot"></div>
    </section>

    <section id="my-rooms-section" class="card my-rooms-card" style="display:none">
      <div class="card-head compact">
        <span class="eyebrow neon">mis salas</span>
        <h3>Salas creadas</h3>
      </div>
      <div id="my-rooms-list"></div>
    </section>

    <section class="card config-card">
      <div class="card-head compact">
        <span class="eyebrow">configuración inicial</span>
        <h3>Modo y listas del moderador</h3>
      </div>
      <div class="field-block">
        <label>Modo</label>
        <div class="segmented" id="mode-picker"></div>
      </div>
      <div class="field-block">
        <label>Listas activas</label>
        <div class="chip-wrap" id="genre-picker"></div>
      </div>
      <div class="field-note">Puedes cambiar el modo y las listas antes de crear la sala. La IA no decide aquí: queda guardado en Firebase para todos.</div>
      <div class="field-block" style="margin-top:1rem">
        <span class="eyebrow neon">📋 importador masivo</span>
        <p class="helper-line" style="margin:.4rem 0 .8rem">Pega bloques de canciones generados por IA. Formato: URL | AÑO | TÍTULO</p>
        <div id="home-playlist-editor"></div>
      </div>
      <div id="home-prompt-builder"></div>
    </section>
  </template>

  <!-- Room/Lobby/Game views are rendered dynamically by ui.js -->

  <div id="toast"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
